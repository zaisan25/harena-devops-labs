services:
  streamlit-app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - logs_volume:/app/logs
    environment:
      - LOG_LEVEL=INFO
      - REFRESH_RATE=5
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  logs_volume: