# .github/workflows/ci.yml
name: CI-CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  DOCKERHUB_REPO: kavi-n-alt/devops-control-plane

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install flake8
        run: pip install flake8
      - name: Lint Python code
        run: flake8 app/ --count --max-complexity=10 --statistics

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          cd app
          docker build -t devops-control-plane:test .
      - name: Run container
        run: |
          docker run -d --name test-app -p 8501:8501 devops-control-plane:test
          sleep 5
      - name: Smoke test health endpoint
        run: |
          curl --fail http://localhost:8501/_stcore/health || exit 1
      - name: Check logs directory exists
        run: |
          docker exec test-app test -d /app/logs || exit 1
      - name: Cleanup
        run: docker rm -f test-app

  push:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: |
            ${{ env.DOCKERHUB_REPO }}:latest
            ${{ env.DOCKERHUB_REPO }}:${{ github.sha }}